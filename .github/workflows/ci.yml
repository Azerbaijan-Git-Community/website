name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

env:
  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
  NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: "nice_try"
  BETTER_AUTH_SECRET: "nice_try"
  BETTER_AUTH_URL: "http://localhost:3000"
  # Do not replace the env vars below with secrets
  CRON_SECRET: "nice_try"
  GITHUB_CLIENT_ID: "nice_try"
  GITHUB_CLIENT_SECRET: "nice_try"
  GH_STATS_TOKEN: "nice_try"

jobs:
  quality:
    name: Type & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prettier
        run: pnpm prettier --check .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.x autorun
